app = "formguard-spam-blocker"
primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/formguard.sqlite"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "formguard_data"
  destination = "/data"
